name: CI
on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'tests/smoke/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false
      - uses: azure/setup-helm@v4
        with:
          version: 3.14.4
      - uses: azure/setup-kubectl@v4

      - name: Terraform fmt check
        run: terraform -chdir=infra/terraform fmt -check -recursive

      - name: Helm lint (umbrella)
        run: helm lint infra/helm/umbrella

      - name: Shell lint (non-blocking)
        continue-on-error: true
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          if compgen -G "tests/smoke/*.sh" >/dev/null; then
            shellcheck -e SC2086,SC2155,SC2164 tests/smoke/*.sh || true
          else
            echo "No smoke scripts yet; skipping shellcheck"
          fi

      - name: YAML syntax check
        run: |
          pip install yamllint --quiet
          # Relaxed rules: only error on truly broken YAML, skip style
          yamllint -d '{extends: relaxed, rules: {line-length: disable, truthy: disable, comments: disable, indentation: disable}}' \
            infra/manifests infra/argocd infra/helm/values || true
