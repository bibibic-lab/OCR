apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ocr-seaweedfs
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ocr-gitops
    gitops.ocr/tier: storage
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  sources:
    - repoURL: https://seaweedfs.github.io/seaweedfs/helm
      targetRevision: 4.0.0
      chart: seaweedfs
      helm:
        releaseName: seaweedfs
        valueFiles:
          - $values/infra/helm/values/dev/seaweedfs.yaml
    - repoURL: https://github.com/bibibic-lab/OCR
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: processing
  syncPolicy:
    automated: null
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    # SeaweedFS StatefulSet volumeClaimTemplates immutable
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
