# ArgoCD dev values. chart 9.5.2 / appVersion v3.3.7. argocd ns.
# image tag는 chart default 사용 (호환성 보장).

server:
  replicas: 2
  extraArgs:
    - --insecure   # dev: TLS 비활성. Phase 1에 cert-manager 연동.
  service:
    type: ClusterIP

configs:
  params:
    server.insecure: "true"

controller:
  replicas: 1

repoServer:
  # dev: 1 replica + probe timeout 완화 (argocd 3.x는 2.x보다 무거워
  # kind 4-node에서 liveness timeout 빈발. Phase 1에 resources 튜닝.)
  replicas: 1
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { memory: 1Gi }
  livenessProbe:
    timeoutSeconds: 30
    periodSeconds: 30
    failureThreshold: 5
  readinessProbe:
    timeoutSeconds: 30
    periodSeconds: 30

applicationSet:
  replicas: 1

redis:
  enabled: true
