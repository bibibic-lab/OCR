installCRDs: true
prometheus:
  enabled: true
  servicemonitor:
    enabled: false  # Phase 1에 prometheus-operator 설치 후 true

replicaCount: 2
resources:
  requests: { cpu: 10m, memory: 32Mi }
  limits:   { memory: 128Mi }
podSecurityContext:
  runAsNonRoot: true
  seccompProfile: { type: RuntimeDefault }
podDisruptionBudget:
  enabled: true
  minAvailable: 1

webhook:
  replicaCount: 2
  resources:
    requests: { cpu: 10m, memory: 32Mi }
    limits:   { memory: 64Mi }
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

cainjector:
  replicaCount: 2
  resources:
    requests: { cpu: 10m, memory: 64Mi }
    limits:   { memory: 256Mi }
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
