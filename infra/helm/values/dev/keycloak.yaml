# Keycloak dev 구성 (admin ns, external pg-main DB, cert-manager TLS).
# Phase 1 Low #3: Keycloak 프로덕션 모드 강화 (2026-04-22)
#   - KC_HOSTNAME 명시적 설정 (keycloak.admin.svc.cluster.local)
#   - KC_HOSTNAME_STRICT=true (issuer 고정)
#   - KC_METRICS_ENABLED=true (Prometheus scraping 대비)
#   - KC_HEALTH_ENABLED=true (헬스 엔드포인트 노출)
#   - KC_LOG_LEVEL=INFO (명시 고정)
#   - 이벤트 로깅은 kcadm.sh로 realm 레벨에서 별도 활성화

image:
  # Bitnami가 2024.08 free 이미지를 'bitnamilegacy' 네임스페이스로 이동.
  # 'bitnami/*'는 Secure Images(유료) 전용. 무료 사용은 bitnamilegacy 사용.
  registry: docker.io
  repository: bitnamilegacy/keycloak
  tag: 26.3.3-debian-12-r0

replicaCount: 2

auth:
  adminUser: keycloak-admin
  existingSecret: keycloak-admin
  passwordSecretKey: password

postgresql:
  enabled: false
externalDatabase:
  host: pg-main-rw.processing.svc.cluster.local
  port: 5432
  user: keycloak
  database: keycloak
  existingSecret: keycloak-db
  existingSecretPasswordKey: password

service:
  type: ClusterIP
ingress:
  enabled: false

production: true
proxy: edge

tls:
  enabled: true
  existingSecret: keycloak-tls
  usePemCerts: true

extraEnvVars:
  # Hostname: cluster-internal FQDN 명시적 고정
  # KC_HOSTNAME_STRICT=true → issuer 항상 https://keycloak.admin.svc.cluster.local/realms/ocr
  # 주의: port-forward(localhost) 환경에서는 iss 불일치 발생 → 클러스터 내부 curl로 검증
  - name: KC_HOSTNAME
    value: "keycloak.admin.svc.cluster.local"
  - name: KC_HOSTNAME_STRICT
    value: "true"
  - name: KC_HOSTNAME_STRICT_HTTPS
    value: "true"
  - name: KC_PROXY
    value: "edge"
  # Observability
  - name: KC_METRICS_ENABLED
    value: "true"
  - name: KC_HEALTH_ENABLED
    value: "true"
  # Logging
  - name: KC_LOG_LEVEL
    value: "INFO"

# PSS restricted (admin ns) 호환
podSecurityContext:
  enabled: true
  fsGroup: 1001
  runAsNonRoot: true
containerSecurityContext:
  enabled: true
  runAsUser: 1001
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault

resources:
  requests: { cpu: 200m, memory: 512Mi }
  limits:   { memory: 1Gi }

pdb:
  create: true
  minAvailable: 1

startupProbe:
  enabled: true
  initialDelaySeconds: 90
