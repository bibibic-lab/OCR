fullnameOverride: kps

grafana:
  adminPassword: change-me-in-prod  # Phase 1: Keycloak OIDC 또는 existingSecret으로 대체
  persistence: { enabled: true, size: 10Gi }
  service: { type: ClusterIP }
  ingress: { enabled: false }
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { memory: 512Mi }
  podDisruptionBudget:
    minAvailable: 1

alertmanager:
  alertmanagerSpec:
    replicas: 2
    retention: 240h
    resources:
      requests: { cpu: 50m, memory: 128Mi }
      limits:   { memory: 256Mi }
    podDisruptionBudget:
      minAvailable: 1
  ingress: { enabled: false }

prometheus:
  prometheusSpec:
    replicas: 2
    retention: 30d
    retentionSize: 40GB
    resources:
      requests: { cpu: 500m, memory: 2Gi }
      limits:   { cpu: 2,    memory: 8Gi }
    storageSpec:
      volumeClaimTemplate:
        spec:
          resources: { requests: { storage: 50Gi } }
    podDisruptionBudget:
      minAvailable: 1
    # 전 네임스페이스 ServiceMonitor 감지
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    securityContext:
      runAsNonRoot: true
      seccompProfile: { type: RuntimeDefault }

kubeStateMetrics: { enabled: true }
# node-exporter는 hostNetwork/hostPID/hostPath 요구로 baseline PSS에서도 불가.
# dev 환경에서는 disable. 프로덕션은 전용 privileged ns 또는 kube-system 배치.
nodeExporter: { enabled: false }
prometheus-node-exporter: { enabled: false }

# Dashboard: Loki 대신 OpenSearch 사용 (별도 설치). Grafana OpenSearch
# 데이터소스 플러그인과 provisioning은 로그 파이프라인(T12 또는 Phase 1)에서 추가.
