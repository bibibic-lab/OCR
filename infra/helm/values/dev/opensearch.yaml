clusterName: ocr-logs
replicas: 3
singleNode: false

persistence:
  enabled: true
  size: 50Gi

resources:
  requests: { cpu: 500m, memory: 2Gi }
  limits:   { cpu: 2,    memory: 4Gi }

config:
  opensearch.yml: |
    # dev: security plugin 비활성 (TLS 인증서 부트스트랩 없이 빠른 개발)
    # Phase 1: plugins.security.disabled=false + cert-manager로 transport/http
    # 인증서 발급 + Keycloak SAML 연동으로 복구.
    plugins.security.disabled: true

# extraEnvs OPENSEARCH_INITIAL_ADMIN_PASSWORD: security disabled 환경에서는 불필요.
# Phase 1 복구 시 다시 추가.

service:
  type: ClusterIP

# HA·안정성
podDisruptionBudget:
  enabled: true
  minAvailable: 2
securityContext:
  runAsNonRoot: true
podSecurityContext:
  fsGroup: 1000
  runAsUser: 1000

# Phase 1: enforce_hostname_verification: true + cert-manager Certificate로
# SAN 포함 노드 인증서 발급 필요. 현재는 dev 간편성을 위해 off.
