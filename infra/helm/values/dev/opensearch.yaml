clusterName: ocr-logs
replicas: 3
singleNode: false

persistence:
  enabled: true
  size: 50Gi

resources:
  requests: { cpu: 500m, memory: 2Gi }
  limits:   { cpu: 2,    memory: 4Gi }

config:
  opensearch.yml: |
    plugins.security.disabled: false
    plugins.security.ssl.transport.enforce_hostname_verification: false

# 보안 플러그인 초기 admin 비밀번호 (Phase 1: Keycloak SAML 연동)
extraEnvs:
  - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: opensearch-admin
        key: password

service:
  type: ClusterIP

# HA·안정성
podDisruptionBudget:
  enabled: true
  minAvailable: 2
securityContext:
  runAsNonRoot: true
podSecurityContext:
  fsGroup: 1000
  runAsUser: 1000

# Phase 1: enforce_hostname_verification: true + cert-manager Certificate로
# SAN 포함 노드 인증서 발급 필요. 현재는 dev 간편성을 위해 off.
