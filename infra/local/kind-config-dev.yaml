# Local kind 클러스터 (OCR Dev)
# - 4노드(control-plane 1 + worker 3)로 3존 분리 simulate
# - kindnet(기본 CNI) 비활성: Cilium으로 NetworkPolicy 강제 필요
# - 80/443 host 포트 매핑으로 Ingress 테스트 가능
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: ocr-dev
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - { containerPort: 80,  hostPort: 80,  protocol: TCP }
      - { containerPort: 443, hostPort: 443, protocol: TCP }
  - role: worker
    labels:
      zone-hint: dmz-processing
  - role: worker
    labels:
      zone-hint: admin-observability
  - role: worker
    labels:
      zone-hint: security
networking:
  disableDefaultCNI: true      # Cilium을 CNI로 사용 (NetworkPolicy 강제)
  kubeProxyMode: none           # Cilium kube-proxy replacement 활성화
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
