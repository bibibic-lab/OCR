# OCR 플랫폼 핵심 Namespace 정의
# ArgoCD sync-wave: -1 (가장 먼저 생성)
# 모든 helm chart Application + manifests ApplicationSet가 이 namespace들을 전제함
---
apiVersion: v1
kind: Namespace
metadata:
  name: security
  labels:
    app.kubernetes.io/part-of: ocr-platform
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
