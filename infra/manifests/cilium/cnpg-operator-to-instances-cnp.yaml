# CNPG operator (security ns) → pg instance pods (모든 ns) 통신 허용.
# instance 관리 포트(8000), metrics(9187), postgres(5432) 등 전체 포트 허용.
# instance pod는 CNPG가 붙이는 label 'cnpg.io/podRole=instance'로 식별.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-cnpg-operator-to-instances
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/podRole: instance
  ingress:
    # fromEntities: cluster — 클러스터 내부 모든 endpoint 허용.
    # Phase 1: operator label 기반 세분화(현재 label 매칭 이슈로 잠정 완화).
    - fromEntities: [cluster]
