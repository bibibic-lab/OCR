apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: admin-ui-env
  namespace: admin
  annotations:
    # OpenBao kv/admin/admin-ui-env 에서 두 개의 키를 가져와
    # admin ns의 admin-ui-env Secret 을 생성·관리.
    # refreshInterval: 1m — OpenBao 값 변경 후 최대 60초 내 동기화.
    managed-by: external-secrets-operator
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: openbao-kv
    kind: ClusterSecretStore
  target:
    name: admin-ui-env
    creationPolicy: Owner
    # ESO 가 이 Secret 의 owner 가 되므로,
    # ExternalSecret 삭제 시 Secret 도 함께 삭제됨.
  data:
    - secretKey: AUTH_SECRET
      remoteRef:
        key: admin/admin-ui-env
        property: AUTH_SECRET
    - secretKey: KEYCLOAK_CLIENT_SECRET
      remoteRef:
        key: admin/admin-ui-env
        property: KEYCLOAK_CLIENT_SECRET
