apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao-kv
  annotations:
    # OpenBao KV v2 백엔드를 사용하는 클러스터 전역 SecretStore.
    # ESO ServiceAccount(external-secrets/external-secrets)가
    # OpenBao Kubernetes auth의 eso-admin-reader 롤을 통해 인증.
    managed-by: external-secrets-operator
spec:
  provider:
    vault:
      server: "https://openbao.security.svc.cluster.local:8200"
      path: "kv"
      version: "v2"
      # openbao-tls Secret의 ca.crt — OCR 내부 CA 체인
      caProvider:
        type: Secret
        name: openbao-tls
        key: ca.crt
        namespace: security
      auth:
        kubernetes:
          # OpenBao에서 활성화된 kubernetes auth mount 경로
          mountPath: "kubernetes"
          role: "eso-admin-reader"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
