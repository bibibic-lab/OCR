---
# Fluentbit → OpenSearch 인증 Secret (kube-system)
# Phase 1 Low #2: OpenSearch security 활성화 후 Fluentbit 인증 정보
# OpenBao kv/observability/opensearch-fluentbit → opensearch-fluentbit-creds Secret (kube-system)
# Fluentbit이 kube-system에 배포되므로 Secret도 kube-system에 위치
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: opensearch-fluentbit-creds
  namespace: kube-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-kv
    kind: ClusterSecretStore
  target:
    name: opensearch-fluentbit-creds
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: observability/opensearch-fluentbit
        property: password
