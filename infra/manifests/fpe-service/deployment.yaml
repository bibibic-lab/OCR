# fpe-service Deployment
# ─────────────────────────────────────────────────────────────────────────────
# FPE Tokenization Service (FF3-1, NIST SP 800-38G)
# Namespace: security
# Port: 8080
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fpe-service
  namespace: security
  labels:
    app.kubernetes.io/name: fpe-service
    app.kubernetes.io/component: security
    app.kubernetes.io/version: v0.1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fpe-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fpe-service
        app.kubernetes.io/component: security
        app.kubernetes.io/version: v0.1.0
        zone: security
    spec:
      serviceAccountName: fpe-service
      automountServiceAccountToken: true   # Kubernetes auth to OpenBao
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fpe-service
          image: fpe-service:v0.1.0
          imagePullPolicy: Never   # kind local image
          ports:
            - containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          env:
            # OpenBao 연결
            - name: BAO_ADDR
              value: "https://openbao.security.svc.cluster.local:8200"
            - name: BAO_SKIP_VERIFY
              value: "true"   # dev cluster 내부 TLS — Phase 2에서 CA 주입으로 전환
            - name: BAO_K8S_ROLE
              value: "fpe-service"
            # pg-pii DSN (ExternalSecret이 생성하는 Secret에서 주입)
            - name: PII_DB_DSN
              valueFrom:
                secretKeyRef:
                  name: fpe-service-db-creds
                  key: dsn
            # JWT 검증 설정
            - name: KEYCLOAK_ISSUER
              value: "https://keycloak.admin.svc.cluster.local/realms/ocr"
            - name: FPE_REQUIRE_AUTH
              value: "false"   # dev: JWT 검증 비활성화 (smoke 편의). production: true
            # 정적 개발 토큰 (ExternalSecret으로 주입되기 전까지 임시 사용)
            - name: BAO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: fpe-service-bao-token
                  key: token
                  optional: true   # 없으면 K8s auth로 폴백
            - name: LOG_LEVEL
              value: "INFO"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: tmp
          emptyDir: {}
---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fpe-service
  namespace: security
  labels:
    app.kubernetes.io/name: fpe-service
automountServiceAccountToken: true
