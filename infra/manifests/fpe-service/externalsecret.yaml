# fpe-service ExternalSecret — OpenBao KV → k8s Secret
# ─────────────────────────────────────────────────────────────────────────────
# ESO ClusterSecretStore(openbao-kv) 를 통해 OpenBao KV v2 에서 시크릿 주입.
# OpenBao 정책 fpe-service-reader 가 kv/data/security/* read 권한 필요.
#   (scripts/fpe-bootstrap.sh 에서 설정)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: fpe-service-db-creds
  namespace: security
  annotations:
    managed-by: external-secrets-operator
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: openbao-kv
    kind: ClusterSecretStore
  target:
    name: fpe-service-db-creds
    creationPolicy: Owner
  data:
    - secretKey: dsn
      remoteRef:
        key: security/fpe-service
        property: pii_db_dsn
    - secretKey: password
      remoteRef:
        key: security/fpe-service
        property: pii_db_password
