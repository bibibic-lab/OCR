apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak-tls
  namespace: admin
spec:
  secretName: keycloak-tls
  commonName: keycloak.admin.svc.cluster.local
  dnsNames:
    - keycloak
    - keycloak.admin
    - keycloak.admin.svc
    - keycloak.admin.svc.cluster.local
  issuerRef:
    name: ocr-internal
    kind: ClusterIssuer
  duration: 8760h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
