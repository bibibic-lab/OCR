# OpenSearch 초기 admin 비밀번호 부트스트랩 Secret.
# Helm release의 extraEnvs.OPENSEARCH_INITIAL_ADMIN_PASSWORD가 이 Secret의
# 'password' 키를 참조. dev용 placeholder이며 Phase 1에 External Secrets
# (OpenBao Transit) 또는 Keycloak SAML 연동으로 교체.
apiVersion: v1
kind: Secret
metadata:
  name: opensearch-admin
  namespace: observability
type: Opaque
stringData:
  password: change-me-in-prod
