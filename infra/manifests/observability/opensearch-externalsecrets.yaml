---
# OpenSearch admin 비밀번호 ExternalSecret
# Phase 1 Low #2: security plugin 복구용
# OpenBao kv/observability/opensearch-admin → opensearch-admin-creds Secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: opensearch-admin-creds
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-kv
    kind: ClusterSecretStore
  target:
    name: opensearch-admin-creds
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: observability/opensearch-admin
        property: password
---
# OpenSearch Fluentbit 사용자 비밀번호 ExternalSecret
# OpenBao kv/observability/opensearch-fluentbit → opensearch-fluentbit-creds Secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: opensearch-fluentbit-creds
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-kv
    kind: ClusterSecretStore
  target:
    name: opensearch-fluentbit-creds
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: observability/opensearch-fluentbit
        property: password
