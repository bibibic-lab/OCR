# OCR Worker Deployment — Stage B-0
# processing ns. 1 replica dev (B-2에서 다중으로 확장).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-worker
  namespace: processing
  labels:
    app.kubernetes.io/name: ocr-worker
    app.kubernetes.io/component: ocr
    app.kubernetes.io/version: "0.1.0"
    zone: processing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ocr-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ocr-worker
        app.kubernetes.io/component: ocr
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ocr
          image: ocr-worker:v0.1.0
          imagePullPolicy: IfNotPresent  # kind load docker-image 사용
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false  # PaddleOCR이 /tmp에 모델 캐시 writable 필요
---
apiVersion: v1
kind: Service
metadata:
  name: ocr-worker
  namespace: processing
  labels:
    app.kubernetes.io/name: ocr-worker
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ocr-worker
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
