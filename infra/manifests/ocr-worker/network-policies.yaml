# ocr-worker NetworkPolicy — processing 네임스페이스
# default-deny는 processing ns에 이미 존재함.
# 이 파일은 dmz ns(upload-api)에서 processing ns 서비스 접근을 허용하는 규칙을 정의한다.
---
# ── Ingress: dmz → processing 서비스 허용 ─────────────────────────────────
# upload-api(dmz ns)가 PostgreSQL, SeaweedFS S3, OCR Worker에 접근할 수 있도록 허용.
# NOTE: NetworkPolicy port는 pod 컨테이너 포트 기준 (Service port ≠ pod port):
#   - PostgreSQL:    5432 (CNPG pod containerPort)
#   - SeaweedFS S3:  8333 (weed server pod containerPort)
#   - ocr-worker:    8000 (uvicorn containerPort; Service port 80 → targetPort http=8000)
# Zero-trust 세분화 (2026-04-23 리뷰 IMP-1):
#   - from 측: dmz ns 전체 → upload-api pod 한정
#   - to 측: processing ns 전체 → 각 타겟 pod 한정 (pg-main / seaweedfs-s3 / ocr-worker)
# 각 타겟 pod에 별도 NetworkPolicy를 두어 podSelector로 스코프 제한.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dmz-uploadapi-to-pg-main
  namespace: processing
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: pg-main
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: dmz
          podSelector:
            matchLabels:
              app.kubernetes.io/name: upload-api
      ports:
        - port: 5432
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dmz-uploadapi-to-seaweedfs-s3
  namespace: processing
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: seaweedfs
      app.kubernetes.io/component: s3
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: dmz
          podSelector:
            matchLabels:
              app.kubernetes.io/name: upload-api
      ports:
        - port: 8333
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dmz-uploadapi-to-ocr-worker
  namespace: processing
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ocr-worker
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: dmz
          podSelector:
            matchLabels:
              app.kubernetes.io/name: upload-api
      ports:
        - port: 8000
          protocol: TCP
