# OpenBao TLS 인증서 — cert-manager ocr-internal ClusterIssuer에서 발급.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openbao-tls
  namespace: security
spec:
  secretName: openbao-tls
  commonName: openbao.security.svc.cluster.local
  dnsNames:
    - openbao
    - openbao.security
    - openbao.security.svc
    - openbao.security.svc.cluster.local
    - "openbao-0.openbao-internal.security.svc.cluster.local"
    - "openbao-1.openbao-internal.security.svc.cluster.local"
    - "openbao-2.openbao-internal.security.svc.cluster.local"
  issuerRef:
    name: ocr-internal
    kind: ClusterIssuer
  duration: 8760h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
