# CNPG operator → pg instance 상태 확인 포트(8000) 허용.
# 표준 NetworkPolicy (Cilium도 이를 존중) 사용. namespaceSelector {}는
# 모든 네임스페이스의 모든 pod를 매치하므로 cross-ns operator→instance
# 통신이 명시적으로 허용됨.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cnpg-status-check
  namespace: processing
spec:
  podSelector:
    matchLabels:
      cnpg.io/podRole: instance
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - port: 8000
          protocol: TCP
        - port: 5432
          protocol: TCP
        - port: 9187
          protocol: TCP
