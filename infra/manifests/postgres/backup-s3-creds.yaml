# pg-backup-s3-creds: CNPG barmanObjectStore용 S3 자격증명 Secret.
# dev 플레이스홀더 값 사용 — SeaweedFS S3 auth configmap의 pg-backup identity와 매핑.
# Phase 2에서 ESO(OpenBao KV) 기반 자동 주입으로 전환 예정.
# 실제 운영 환경에서는 이 파일을 커밋하지 않고 ESO로 대체할 것.
apiVersion: v1
kind: Secret
metadata:
  name: pg-backup-s3-creds
  namespace: processing
type: Opaque
stringData:
  accessKeyId: "dev-backup-access-key"
  secretAccessKey: "dev-backup-secret-key"
---
# pg-pii용 동일 자격증명 (security ns)
apiVersion: v1
kind: Secret
metadata:
  name: pg-backup-s3-creds
  namespace: security
type: Opaque
stringData:
  accessKeyId: "dev-backup-access-key"
  secretAccessKey: "dev-backup-secret-key"
