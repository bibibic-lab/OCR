# pg-pii: security zone 분리 Postgres (PII 원본, FPE 토큰 보관).
# 물리·네트워크 격리 원칙 (§2.7). 메인과 절대 공유하지 않는 별도 클러스터.
# dev는 1-instance로 단순화.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-pii
  namespace: security
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2
  # CNPG가 pg-pii-superuser Secret을 자동 생성 (Phase 1: ESO 이관 예정).
  # fpe-service bootstrap Job이 fpe_token 스키마·role을 superuser 권한으로 적용.
  enableSuperuserAccess: true
  storage:
    size: 5Gi
    storageClass: standard
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  bootstrap:
    initdb:
      database: pii_vault
      owner: pii
      encoding: UTF8
  postgresql:
    # CNPG가 TLS 전 클러스터 자체 관리 (spec.certificates 필드). ssl/ssl_cert_file 등
    # 'fixed' 파라미터는 Cluster spec에서 설정 금지.
    parameters:
      log_connections: "on"
      log_disconnections: "on"
  backup:
    barmanObjectStore:
      destinationPath: "s3://pii-backups/pg-pii"
      endpointURL: "http://seaweedfs-s3.processing.svc.cluster.local:8333"
      s3Credentials:
        accessKeyId:
          name: pg-backup-s3-creds
          key: accessKeyId
        secretAccessKey:
          name: pg-backup-s3-creds
          key: secretAccessKey
      wal:
        compression: gzip
        maxParallel: 2
      data:
        compression: gzip
        jobs: 2
    retentionPolicy: "14d"
  monitoring:
    enablePodMonitor: true
