apiVersion: apps/v1
kind: Deployment
metadata:
  name: upload-api
  namespace: dmz
  labels:
    app.kubernetes.io/name: upload-api
    app.kubernetes.io/component: api
    zone: dmz
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: upload-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: upload-api
        app.kubernetes.io/component: api
        zone: dmz
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: upload-api
          image: upload-api:v0.4.0
          # IfNotPresent: kind-local 개발 전용. CI/CD 도입(Phase 1) 시 immutable digest
          # 참조 또는 Always + pull 비밀 정책으로 전환 필요. (리뷰 IMP-2)
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false   # keytool이 cacerts 파일 수정 필요
          env:
            # DB 자격증명 (B1-T1 Job이 생성한 Secret)
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: upload-api-db-creds
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: upload-api-db-creds
                  key: password
            - name: DB_JDBC_URL
              valueFrom:
                secretKeyRef:
                  name: upload-api-db-creds
                  key: jdbc-url
            # Keycloak (ocr realm)
            - name: KEYCLOAK_ISSUER_URI
              value: "https://keycloak.admin.svc.cluster.local/realms/ocr"
            # SeaweedFS S3
            - name: S3_ENDPOINT
              value: "http://seaweedfs-s3.processing.svc.cluster.local:8333"
            - name: S3_BUCKET
              value: "uploads"
            - name: S3_ACCESS_KEY
              value: "dev"
            - name: S3_SECRET_KEY
              value: "dev-secret"
            # OCR Worker — Phase 1 #1: Paddle PP-OCRv5로 전환 (2026-04-23)
            # 기존 ocr-worker(EasyOCR)는 병렬 유지 · Phase 2에서 제거 예정
            - name: OCR_WORKER_URL
              value: "http://ocr-worker-paddle.processing.svc.cluster.local"
            # FPE 토큰화 서비스 — Phase 1 Low #4 통합 (2026-04-22)
            - name: FPE_SERVICE_URL
              value: "http://fpe-service.security.svc.cluster.local"
            - name: FPE_TOKENIZATION_ENABLED
              value: "true"
          volumeMounts:
            - name: ocr-internal-ca
              mountPath: /etc/ssl/ocr-internal
              readOnly: true
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1.5Gi"
      volumes:
        - name: ocr-internal-ca
          secret:
            secretName: ocr-internal-ca
            items:
              - key: ca.crt
                path: ca.crt
