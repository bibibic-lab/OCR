# upload-api NetworkPolicy — dmz 네임스페이스
# default-deny (전체 pod 차단)는 dmz ns에 이미 존재함.
# 이 파일은 upload-api pod에 한정된 허용 규칙을 정의한다.
---
# ── Egress: upload-api → 외부 서비스 허용 ─────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: upload-api-egress
  namespace: dmz
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: upload-api
  policyTypes:
    - Egress
  egress:
    # DNS (kube-dns)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

    # processing ns: PostgreSQL(5432) + SeaweedFS S3(8333) + OCR Worker(8000)
    # namespaceSelector만 사용 — Cilium KubeProxyReplacement 환경에서 AND조건
    # (podSelector+namespaceSelector) 시 서비스 ClusterIP DNAT 이후 pod label 매칭이
    # 불안정함. ns-level 허용으로 단순화하고 Phase 1에서 CiliumNetworkPolicy로 세분화.
    # NOTE: NetworkPolicy는 pod 포트 기준. ocr-worker 컨테이너 포트=8000
    #       (Service port 80 → targetPort http=8000)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: processing
      ports:
        - port: 5432
          protocol: TCP
        - port: 8333
          protocol: TCP
        - port: 8000
          protocol: TCP

    # security ns: fpe-service HTTP(80)
    # Service port=80 → targetPort 8080 (fpe-service)
    # NOTE: NetworkPolicy는 pod 포트 기준. fpe-service 컨테이너 포트=8080
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: security
      ports:
        - port: 8080
          protocol: TCP

    # Keycloak (admin ns, port 443/8443)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: admin
      ports:
        - port: 443
          protocol: TCP
        - port: 8443
          protocol: TCP
---
# ── Ingress: upload-api 수신 허용 ─────────────────────────────────────────
# dev: port-forward(kubelet)는 별도 규칙 없이 작동.
# Phase 1: API GW/Ingress pod → upload-api 80/8080 허용 추가 예정.
# observability ns에서 Prometheus scraping 허용 (8080/tcp).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: upload-api-ingress
  namespace: dmz
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: upload-api
  policyTypes:
    - Ingress
  ingress:
    # Prometheus scraping (observability ns → 8080)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - port: 8080
          protocol: TCP

    # admin-ui (admin ns → 8080) — B3-T4에서 추가
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: admin
          podSelector:
            matchLabels:
              app.kubernetes.io/name: admin-ui
      ports:
        - port: 8080
          protocol: TCP
