server:
  port: 8080

spring:
  application:
    name: upload-api
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 52MB
      # 50 MB 이하 파일도 디스크 백킹(disk-backed)으로 처리 → InputStream 재사용 안전
      file-size-threshold: 1MB
  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak ocr realm. 실제 연결 검증은 T5 smoke에서 수행.
          # CA 신뢰 설정(ocr-internal ClusterIssuer)도 T5에서 JVM truststore 주입.
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://keycloak.admin.svc.cluster.local/realms/ocr}
  datasource:
    url: ${DB_JDBC_URL:jdbc:postgresql://pg-main-rw.processing.svc.cluster.local:5432/dmz}
    username: ${DB_USERNAME:dmz_app}
    password: ${DB_PASSWORD:}
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db

ocr:
  s3:
    endpoint: ${S3_ENDPOINT:http://seaweedfs-s3.processing.svc.cluster.local:8333}
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET:uploads}
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
    path-style: true
  ocr-worker:
    base-url: ${OCR_WORKER_URL:http://ocr-worker.processing.svc.cluster.local}
    timeout-ms: ${OCR_WORKER_TIMEOUT_MS:60000}
  fpe:
    enabled: ${FPE_TOKENIZATION_ENABLED:true}
    service-url: ${FPE_SERVICE_URL:http://fpe-service.security.svc.cluster.local}
    timeout-ms: ${FPE_TIMEOUT_MS:10000}
  # POLICY-NI-01: 관리 대시보드 Not Implemented 기능 목록 (하드코딩, config 기반)
  # POLICY-EXT-01: 외부연계 전면 더미 — 실 구현 가이드: docs/ops/integration-real-impl-guide.md
  # anchor는 docs/ops/integration-real-impl-guide.md 섹션 anchor와 반드시 1:1 일치.
  # 코드 마커: IdVerifyRoute.GUIDE_ANCHOR / TsaRoute.GUIDE_ANCHOR / OcspRoute.GUIDE_ANCHOR
  not-implemented:
    - feature: "행안부 주민등록 진위확인"
      reason: "실 API 계약 대기"
      guide-ref: "docs/ops/integration-real-impl-guide.md#행안부-주민등록-진위확인"
    - feature: "KISA TSA 타임스탬프"
      reason: "실 API 계약 대기 — KISA TSA 계정 발급 후 전환"
      guide-ref: "docs/ops/integration-real-impl-guide.md#kisa-tsa-타임스탬프-rfc-3161"
    - feature: "OCSP 인증서 검증"
      reason: "실 API 계약 대기 — KISA OCSP 서버 접근권 확보 후 전환"
      guide-ref: "docs/ops/integration-real-impl-guide.md#ocsp-인증서-검증"
    - feature: "SoftHSM PKCS#11 실 서명"
      reason: "실 HSM 미조달 — OSS SoftHSM 더미 사용 중"
      guide-ref: "docs/ops/integration-real-impl-guide.md#softhsm-pkcs11"
    - feature: "FIPS 140-3 암호화 라이브러리"
      reason: "OSS FF3 사용 중 — FIPS 인증 라이브러리 미도입"
      guide-ref: "docs/ops/integration-real-impl-guide.md#fips-140-3"
