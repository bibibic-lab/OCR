# Testcontainers нҶөн•© н…ҢмҠӨнҠё м „мҡ© н”„лЎңнҢҢмқј (test-int)
# PostgreSQL + LocalStack S3 м»Ён…Ңмқҙл„ҲлҘј DynamicPropertySourceлЎң мЈјмһ….
# FlywayлҠ” нҷңм„ұнҷ”(мӢӨм ң мҠӨнӮӨл§Ҳ кІҖмҰқ).

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ~
          # MockMvc SecurityMockMvcRequestPostProcessors.jwt() мӮ¬мҡ© мӢң
          # JwtDecoder л№Ҳмқ„ MockBeanмңјлЎң лҢҖмІҙн•ҳлҜҖлЎң JWKS URI л¶Ҳн•„мҡ”.
          jwk-set-uri: http://localhost:0/jwks

  # Flyway нҷңм„ұнҷ” (V1 мҠӨнӮӨл§Ҳ м Ғмҡ©)
  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 52MB
      file-size-threshold: 1MB

ocr:
  s3:
    # endpoint/access-key/secret-key/region мқҖ DynamicPropertySource м—җм„ң мЈјмһ…
    bucket: uploads
    path-style: true
  ocr-worker:
    base-url: http://localhost:0
    timeout-ms: 5000

management:
  endpoint:
    health:
      probes:
        enabled: true
